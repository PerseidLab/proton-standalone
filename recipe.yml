version: 1
AppDir:
  path: ./AppDir
  app_info:
    id: portable-proton-runner
    name: Portable Proton Runner
    icon: run-proton
    version: 1.0.0
    exec: run-proton  # This points to your script
    exec_args: "$@"
  runtime:
    env:
      # This ensures the script knows it's inside an AppImage
      APPDIR_LIBRARY_PATH: "$APPDIR/usr/lib:$APPDIR/lib"
  apt:
    arch: amd64
    # Basic dependencies for Proton/Wine to function
    packages:
      - libnss3
      - libglib2.0-0
      - libdbus-1-3
      - libx11-6
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy main universe

AppImage:
  update-information: 'guess'
  sign-key: None
  arch: x86_64
