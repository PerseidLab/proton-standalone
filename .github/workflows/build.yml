name: Build AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils libgdk-pixbuf2.0-dev fakeroot binutils appstream

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install appimage-builder
        run: pip install appimage-builder

      - name: Prepare AppDir
        run: |
          # Ensure scripts are executable
          chmod +x AppDir/AppRun
          chmod +x AppDir/run-proton

          # Create symlink for bash to satisfy the builder's check
          mkdir -p AppDir/bin
          ln -sf /bin/bash AppDir/bin/bash

      - name: Build AppImage
        shell: bash
        env:
          ARCH: x86_64
        run: |
          # No sudo needed here, the [trusted=yes] in the recipe handles it
          appimage-builder --skip-tests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proton-Standalone-AppImage
          path: ./*.AppImage
