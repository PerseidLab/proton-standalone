name: Build GE-Proton Standalone AppImage

on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC
  workflow_dispatch:      # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout your repo
      uses: actions/checkout@v3

    - name: Fetch latest GE-Proton release info
      id: geproton
      run: |
        GE_PROTON_API="https://api.github.com/repos/GloriousEggroll/proton-ge-custom/releases/latest"
        echo "Fetching latest GE-Proton release info..."
        response=$(curl -s $GE_PROTON_API)
        tag_name=$(echo "$response" | jq -r '.tag_name')
        echo "Latest GE-Proton release tag: $tag_name"
        echo "::set-output name=tag::$tag_name"

    - name: Download latest GE-Proton release archive
      run: |
        TAG=${{ steps.geproton.outputs.tag }}
        echo "Downloading GE-Proton release $TAG"
        # Choose appropriate asset, for example the tar.gz or zip archive:
        URL="https://github.com/GloriousEggroll/proton-ge-custom/releases/download/$TAG/GE-Proton-$TAG.tar.gz"
        curl -L -o ge-proton.tar.gz "$URL"

    - name: Extract GE-Proton into opt/
      run: |
        rm -rf ./AppDir/opt/GE-Proton
        mkdir -p ./AppDir/opt
        tar -xzf ge-proton.tar.gz -C ./AppDir/opt
        mv ./AppDir/opt/GE-Proton-$TAG ./AppDir/opt/GE-Proton

- name: Download appimagetool
  run: |
    curl -LO https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
    chmod +x appimagetool-x86_64.AppImage

    - name: Build AppImage
      run: |
        ./appimagetool.AppImage ./AppDir

    - name: Rename AppImage with version
      run: |
        TAG=${{ steps.geproton.outputs.tag }}
        VERSION="${TAG#GE-Proton}"  # remove leading 'GE-Proton' if present
        # Clean version string e.g. 10-29 -> 10.29
        VERSION="${VERSION//-/.}"
        NEW_NAME="ge-proton-${VERSION}-standalone.AppImage"
        mv ./AppDir.AppImage "./${NEW_NAME}"
        echo "AppImage renamed to $NEW_NAME"

    - name: Upload Release Asset (optional)
      uses: softprops/action-gh-release@v1
      with:
        files: "./ge-proton-*-standalone.AppImage"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
