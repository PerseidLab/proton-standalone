name: Build AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils libgdk-pixbuf2.0-dev fakeroot binutils

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install appimage-builder
        run: pip install appimage-builder

      - name: Fix Permissions
        run: |
          # Ensure the scripts in AppDir are actually executable
          chmod +x AppDir/AppRun
          chmod +x AppDir/run-proton
          # If you have binaries in opt, make them executable too
          find AppDir/opt -type f -exec chmod +x {} + || true

      - name: Build AppImage
        shell: bash
        env:
          # Explicitly set the architecture for the builder
          ARCH: x86_64
          UPDATE_INFO: none
        run: |
          # No --recipe needed now since it's named AppImageBuilder.yml
          appimage-builder --skip-tests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proton-AppImage
          path: ./*.AppImage
