name: Build Portable Proton AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 file wget curl
          # UPDATED: Using the new official appimagetool repository URL
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Prepare AppDir and Fetch GE-Proton
        run: |
          # 1. Create the AppDir structure
          mkdir -p PortableProton.AppDir/opt/GE-Proton

          # 2. Get latest GE-Proton release URL
          GE_URL=$(curl -s https://api.github.com/repos/GloriousEggroll/proton-ge-custom/releases/latest \
            | grep "browser_download_url.*\.tar\.gz" \
            | cut -d '"' -f 4 | head -n 1)

          echo "Downloading $GE_URL..."
          curl -Lo proton.tar.gz "$GE_URL"

          # 3. Extract GE-Proton
          tar -xzf proton.tar.gz -C PortableProton.AppDir/opt/GE-Proton --strip-components=1

          # 4. Copy your scripts and assets
          cp AppRun PortableProton.AppDir/
          cp run-proton PortableProton.AppDir/
          cp run-proton.desktop PortableProton.AppDir/
          # Ensure an icon exists so appimagetool doesn't complain
          if [ -f "run-proton.png" ]; then
            cp run-proton.png PortableProton.AppDir/
          else
            touch PortableProton.AppDir/run-proton.png
          fi

          chmod +x PortableProton.AppDir/AppRun
          chmod +x PortableProton.AppDir/run-proton

      - name: Build AppImage
        run: |
          # Use --appimage-extract-and-run if FUSE is being finicky in the runner
          ./appimagetool-x86_64.AppImage --appimage-extract-and-run PortableProton.AppDir Portable-Proton-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Portable-Proton
          path: "*.AppImage"

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: "*.AppImage"
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
