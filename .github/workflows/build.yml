name: Build Portable Proton AppImage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 kpartx desktop-file-utils

      - name: Prepare AppDir
        run: |
          # Ensure AppDir exists and has correct structure based on your screenshot
          mkdir -p AppDir/opt

          # If your local files aren't already in AppDir, move them here
          # We ensure the script is named 'AppRun' at the root for AppImage standard
          cp run-proton AppDir/AppRun
          chmod +x AppDir/AppRun

          # Copy resources
          cp run-proton.desktop AppDir/
          cp run-proton.png AppDir/

          # Ensure GE-Proton is in the correct place inside AppDir
          # If it's outside in your repo, move it in:
          [ -d "opt/GE-Proton" ] && cp -r opt/GE-Proton AppDir/opt/

      - name: Download AppImageTool
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          # ARCH is required by appimagetool
          export ARCH=x86_64
          ./appimagetool-x86_64.AppImage AppDir Portable_Proton-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Portable-Proton-AppImage
          path: Portable_Proton-x86_64.AppImage

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Portable_Proton-x86_64.AppImage
