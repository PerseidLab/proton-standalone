name: Build GE-Proton AppImage

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 jq tar wget

      - name: Fetch Latest GE-Proton
        id: get_ge
        run: |
          # Query GitHub API for the latest release tag and download URL
          RELEASE_INFO=$(curl -s https://api.github.com/repos/GloriousEggroll/proton-ge-custom/releases/latest)
          GE_VERSION=$(echo "$RELEASE_INFO" | jq -r '.tag_name')
          DOWNLOAD_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | endswith(".tar.gz")) | .browser_download_url')

          echo "Found Latest Release: $GE_VERSION"

          # Create directory and download
          mkdir -p AppDir/opt/GE-Proton
          wget -qO- "$DOWNLOAD_URL" | tar -xz -C AppDir/opt/GE-Proton --strip-components=1

          # Export variables for later steps
          echo "GE_VERSION=$GE_VERSION" >> $GITHUB_ENV
          echo "FINAL_NAME=${GE_VERSION}-standalone.AppImage" >> $GITHUB_ENV

      - name: Build AppImage
        run: |
          chmod +x appimagetool-x86_64.AppImage
          # Set ARCH and run the tool
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir

      - name: Rename Output
        run: |
          # Rename the default output to your specific format
          # (appimagetool usually outputs based on the .desktop name)
          mv *.AppImage "${{ env.FINAL_NAME }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GE_VERSION }}-AppImage
          path: "${{ env.FINAL_NAME }}"

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.GE_VERSION }}-${{ github.run_number }}
          name: Release ${{ env.GE_VERSION }}
          files: "${{ env.FINAL_NAME }}"
          body: "Automated standalone build of ${{ env.GE_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
