name: Build GE-Proton AppImage

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 jq tar wget

      - name: Check if update is needed
        id: check_version
        run: |
          # 1. Get the latest version from GloriousEggroll
          GE_RELEASE=$(curl -s https://api.github.com/repos/GloriousEggroll/proton-ge-custom/releases/latest)
          GE_VERSION=$(echo "$GE_RELEASE" | jq -r '.tag_name')

          # 2. Check your own latest release tag
          # We use || true so it doesn't fail if you have 0 releases
          MY_RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest)
          MY_VERSION=$(echo "$MY_RELEASE" | jq -r '.tag_name' || echo "none")

          echo "Latest GE-Proton: $GE_VERSION"
          echo "Your Latest Release: $MY_VERSION"

          if [[ "$MY_VERSION" == "$GE_VERSION"* ]]; then
            echo "Already up to date. Skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "New version found! Starting build..."
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "GE_VERSION=$GE_VERSION" >> $GITHUB_ENV
            echo "DOWNLOAD_URL=$(echo "$GE_RELEASE" | jq -r '.assets[] | select(.name | endswith(".tar.gz")) | .browser_download_url')" >> $GITHUB_ENV
            echo "FINAL_NAME=${GE_VERSION}-standalone.AppImage" >> $GITHUB_ENV
          fi

      - name: Fetch and Extract GE-Proton
        if: steps.check_version.outputs.skip != 'true'
        run: |
          mkdir -p AppDir/opt/GE-Proton
          wget -qO- "${{ env.DOWNLOAD_URL }}" | tar -xz -C AppDir/opt/GE-Proton --strip-components=1

      - name: Build AppImage
        if: steps.check_version.outputs.skip != 'true'
        run: |
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir

      - name: Rename Output Safely
        if: steps.check_version.outputs.skip != 'true'
        run: |
          GENERATED_FILE=$(find . -maxdepth 1 -name "*.AppImage" ! -name "appimagetool-x86_64.AppImage" -print -quit)
          mv "$GENERATED_FILE" "${{ env.FINAL_NAME }}"

      - name: Create Release
        if: steps.check_version.outputs.skip != 'true' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.GE_VERSION }}
          name: Release ${{ env.GE_VERSION }}
          files: "${{ env.FINAL_NAME }}"
          body: "Automated standalone build of ${{ env.GE_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
