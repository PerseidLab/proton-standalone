name: Build and Release AppImage

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Trigger release when you push a tag starting with 'v'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    # Required permissions to create a release
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 desktop-file-utils binutils

      - name: Prepare Permissions
        run: |
          chmod +x AppDir/AppRun
          chmod +x AppDir/run-proton
          chmod +x ./appimagetool-x86_64.appimage

      - name: Build AppImage
        shell: bash
        env:
          ARCH: x86_64
        run: |
          ./appimagetool-x86_64.appimage ./AppDir GE-Proton-Standalone-x86_64.AppImage

      # 1. Upload to Artifacts (Still zipped, good for debugging)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proton-Standalone-Build
          path: ./GE-Proton-Standalone-x86_64.AppImage

      # 2. Create GitHub Release (Unzipped direct download)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./GE-Proton-Standalone-x86_64.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
