name: Build Portable Proton AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 file wget curl
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Prepare AppDir and Fetch GE-Proton
        run: |
          # 1. Create structure
          mkdir -p PortableProton.AppDir/opt/GE-Proton

          # 2. Get latest GE-Proton
          GE_URL=$(curl -s https://api.github.com/repos/GloriousEggroll/proton-ge-custom/releases/latest \
            | grep "browser_download_url.*\.tar\.gz" \
            | cut -d '"' -f 4 | head -n 1)

          echo "Downloading $GE_URL..."
          curl -Lo proton.tar.gz "$GE_URL"
          tar -xzf proton.tar.gz -C PortableProton.AppDir/opt/GE-Proton --strip-components=1

          # 3. GENERATE AppRun (Fixed line 39 syntax)
          cat <<'EOF' > PortableProton.AppDir/AppRun
#!/bin/bash
exec "$(dirname "$0")/run-proton" "$@"
EOF
          chmod +x PortableProton.AppDir/AppRun

          # 4. Copy main script
          cp run-proton PortableProton.AppDir/
          chmod +x PortableProton.AppDir/run-proton

          # 5. GENERATE Desktop file
          cat <<EOF > PortableProton.AppDir/run-proton.desktop
[Desktop Entry]
Name=Portable Proton
Exec=AppRun %f
Icon=run-proton
Type=Application
Terminal=false
Categories=Utility;
MimeType=application/x-ms-dos-executable;
EOF

          # 6. Icon handling
          if [ -f "run-proton.png" ]; then
            cp run-proton.png PortableProton.AppDir/
          else
            touch PortableProton.AppDir/run-proton.png
          fi

      - name: Build AppImage
        run: |
          ./appimagetool-x86_64.AppImage --appimage-extract-and-run PortableProton.AppDir Portable-Proton-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Portable-Proton
          path: "*.AppImage"

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: "*.AppImage"
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
