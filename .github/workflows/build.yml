name: Build AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils libgdk-pixbuf2.0-dev fakeroot binutils appstream

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Downgrading to 3.10 often helps with the versioning bug

      - name: Install appimage-builder and fix dependencies
        run: |
          # Install a specific version of 'packaging' that is sometimes more lenient
          pip install packaging==23.2 appimage-builder

      - name: Prepare AppDir
        run: |
          chmod +x AppDir/AppRun
          chmod +x AppDir/run-proton
          mkdir -p AppDir/bin
          # Ensure there is a dummy binary so the builder detects an architecture
          cp /bin/ls AppDir/bin/ls
          ln -sf /bin/bash AppDir/bin/bash

      - name: Build AppImage
        shell: bash
        env:
          ARCH: x86_64
        run: |
          # Use the --skip-tests flag to move fast
          appimage-builder --skip-tests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proton-Standalone-AppImage
          path: ./*.AppImage
