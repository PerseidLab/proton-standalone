name: Build AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y fuse libfuse2 desktop-file-utils binutils

      - name: Prepare AppDir
        run: |
          # Ensure scripts are executable
          chmod +x AppDir/AppRun
          chmod +x AppDir/run-proton

          # Fix for potential missing icons/desktop issues
          cp AppDir/run-proton.png AppDir/.DirIcon || true

      - name: Download AppImageTool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        shell: bash
        env:
          ARCH: x86_64
        run: |
          # We manually point to the AppDir folder and package it
          ./appimagetool-x86_64.AppImage ./AppDir GE-Proton-Standalone-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proton-Standalone
          path: ./GE-Proton-Standalone-x86_64.AppImage
