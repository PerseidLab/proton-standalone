name: Build AppImage

on:
  push:
    branches:
      - main  # Set this to the branch you want to build from, like "main" or "master"
    tags:
      - 'v*'   # Optional: Builds on every version tag (e.g., v1.0)
  pull_request:
    branches:
      - main

jobs:
  build-appimage:
    runs-on: ubuntu-22.04  # Standard environment for AppImage builds

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y appstream desktop-file-utils libc-bin # System deps for appimage-builder
          pip install appimage-builder

      # This step builds the AppImage using your configuration.
      - name: Build AppImage
        run: appimage-builder --skip-tests
        # Optional: You might need to change 'appimage-builder --skip-tests'
        # to just 'appimage-builder' if you have tests defined.

      # Uploads the final build artifact so you can download it.
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-AppImage # Give the artifact a clear name
          path: '*.AppImage'    # Collects any AppImage file created in the root
