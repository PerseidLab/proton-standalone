name: Build AppImage

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # libfuse2 is required to run AppImages (like appimagetool itself) on Ubuntu 22.04
          sudo apt-get install -y fuse libfuse2 desktop-file-utils binutils

      - name: Prepare AppDir Permissions
        run: |
          # Ensure your scripts are executable
          chmod +x AppDir/AppRun
          chmod +x AppDir/run-proton
          # Ensure the tool you uploaded is executable
          chmod +x ./appimagetool-x86_64.appimage

      - name: Build AppImage
        shell: bash
        env:
          ARCH: x86_64
        run: |
          # Run the tool from your root to package the AppDir folder
          ./appimagetool-x86_64.appimage ./AppDir GE-Proton-Standalone-x86_64.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proton-Standalone-Build
          path: ./GE-Proton-Standalone-x86_64.AppImage
