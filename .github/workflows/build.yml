name: Build and Release AppImage

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 desktop-file-utils binutils curl jq tar

      - name: Fetch Latest GE-Proton and Get Version
        id: get_version
        run: |
          # 1. Get the full release JSON to extract both the version name and the URL
          RELEASE_JSON=$(curl -s https://api.github.com/repos/GloriousEggroll/proton-ge-custom/releases/latest)

          # 2. Extract the Version Name (e.g., GE-Proton9-2)
          GE_VERSION=$(echo "$RELEASE_JSON" | jq -r '.name')
          echo "GE_VERSION=$GE_VERSION" >> $GITHUB_ENV

          # 3. Extract the Download URL
          URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".tar.gz")) | .browser_download_url')

          echo "Downloading $GE_VERSION from: $URL"

          # 4. Prepare directory and extract
          mkdir -p AppDir/opt/GE-Proton
          curl -L "$URL" | tar -xzC AppDir/opt/GE-Proton --strip-components=1

      - name: Prepare Permissions
        run: |
          chmod +x AppDir/AppRun
          chmod +x AppDir/run-proton
          chmod +x ./appimagetool-x86_64.AppImage

      - name: Build AppImage
        shell: bash
        env:
          ARCH: x86_64
        run: |
          # We use the $GE_VERSION variable we saved earlier to name the file
          ./appimagetool-x86_64.AppImage ./AppDir "${{ env.GE_VERSION }}-standalone.AppImage"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GE_VERSION }}-Build
          path: ./*.AppImage

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./*.AppImage
          name: Release ${{ env.GE_VERSION }}
          generate_release_notes: true
