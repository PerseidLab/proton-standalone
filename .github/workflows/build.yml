name: Build AppImage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils libgdk-pixbuf2.0-dev fakeroot binutils

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Use 3.11 for better stability with appimage-builder

      - name: Install appimage-builder
        run: pip install appimage-builder

      - name: Build AppImage
        shell: bash
        env:
          UPDATE_INFO: none
          # This line fixes the "Unable to determine bundle architecture" error
          ARCH: x86_64
        run: |
          # Use the --recipe flag to match your lowercase filename
          appimage-builder --recipe appimage-builder.yml --skip-tests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Proton-AppImage
          path: ./*.AppImage
