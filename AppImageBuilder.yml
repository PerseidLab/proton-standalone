version: 1

AppDir:
  path: ./AppDir
  app_info:
    id: ge.proton.standalone
    name: GE-Proton-Standalone
    icon: run-proton
    version: latest
    # Ensure this matches your script name exactly
    exec: run-proton
    exec_args: $@

  runtime:
    env:
      PATH: '$PATH:$APPDIR/bin:$APPDIR/usr/bin'
      WINEPREFIX: '$APPDIR/proton-prefix'

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe'
    include:
      - libc6
      - libstdc++6

AppImage:
  # This is where the architecture belongs
  arch: x86_64
  update-information: 'none'
  sign-key: 'none'
