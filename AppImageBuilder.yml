version: 1

AppDir:
  path: ./AppDir
  app_info:
    id: ge.proton.standalone
    name: GE-Proton-Standalone
    icon: run-proton
    version: latest
    # This must match your main execution script in AppDir
    exec: run-proton
    exec_args: $@

  runtime:
    # MANDATORY: This stops the "Unable to determine architecture" error
    architecture: x86_64
    env:
      # Ensures the AppImage can find its internal files and system bash
      PATH: '$PATH:$APPDIR/bin:$APPDIR/usr/bin'
      WINEPREFIX: '$APPDIR/proton-prefix'

  # If your app requires specific Ubuntu packages, list them here
  apt:
    arch: amd64
    sources:
      - sourceline: 'deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe'
    include:
      - libc6
      - libstdc++6

AppImage:
  update-information: 'none'
  sign-key: 'none'
  arch: x86_64
