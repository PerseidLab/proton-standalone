version: 1

AppDir:
  path: ./AppDir
  app_info:
    id: ge.proton.standalone
    name: GE-Proton-Standalone
    icon: run-proton
    version: latest
    exec: run-proton
    exec_args: $@

  runtime:
    env:
      PATH: '$PATH:$APPDIR/bin:$APPDIR/usr/bin'
      WINEPREFIX: '$APPDIR/proton-prefix'

  # We remove the 'apt' section to avoid the version parsing bug.
  # If Proton needs specific libs, it's better to assume the host has them
  # or bundle them manually into AppDir/usr/lib.

AppImage:
  arch: x86_64
  update-information: 'none'
  sign-key: 'none'
