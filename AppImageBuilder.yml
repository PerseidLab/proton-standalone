version: 1

AppDir:
  path: ./AppDir
  app_info:
    id: ge.proton.standalone
    name: GE-Proton-Standalone
    icon: run-proton
    version: latest
    exec: run-proton
    exec_args: $@

  runtime:
    env:
      PATH: '$PATH:$APPDIR/bin:$APPDIR/usr/bin'
      WINEPREFIX: '$APPDIR/proton-prefix'

  apt:
    arch: amd64
    sources:
      # Adding [trusted=yes] bypasses the NO_PUBKEY error
      - sourceline: 'deb [trusted=yes] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe'
      - sourceline: 'deb [trusted=yes] http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe'
    include:
      - libc6
      - libstdc++6
      - libglu1-mesa
      - libx11-6

AppImage:
  arch: x86_64
  update-information: 'none'
  sign-key: 'none'
